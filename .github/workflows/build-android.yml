name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., v0.6.48)'
        required: true
        default: 'v0.6.48'
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js with built-in caching
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Setup Java with caching
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK with caching
        uses: android-actions/setup-android@v3

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/sdk
            ~/.android/avd/*.ini
            ~/.android/avd/*/snapshots
          key: ${{ runner.os }}-android-sdk-${{ hashFiles('android/app/build.gradle', 'android/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-android-sdk-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/daemon
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Metro Bundler
        uses: actions/cache@v4
        with:
          path: |
            ~/.metro
            node_modules/.cache/metro
            android/app/build/generated/res/react
          key: ${{ runner.os }}-metro-${{ hashFiles('metro.config.js', 'babel.config.js', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-metro-${{ hashFiles('metro.config.js', 'babel.config.js') }}-
            ${{ runner.os }}-metro-

      - name: Install dependencies with cache optimization
        run: |
          npm ci --legacy-peer-deps --prefer-offline --no-audit --progress=false

      - name: Update version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          VERSION=${TAG_VERSION#v}
          echo "📝 Updating version to $VERSION from tag $TAG_VERSION..."
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('✅ Updated package.json version to:', pkg.version);
          "
          node -e "
            const fs = require('fs');
            const version = '$VERSION';
            const tagVersion = '${{ github.ref_name }}';
            let existingChangeLog = [];
            try {
              const existingData = JSON.parse(fs.readFileSync('release/version.json', 'utf8'));
              existingChangeLog = existingData.changeLog || [];
              console.log('📖 Preserving existing changeLog:', existingChangeLog);
            } catch (e) {
              console.log('⚠️ Could not read existing version.json, will use empty changeLog');
              existingChangeLog = [];
            }
            const downloadUrls = [
              'https://github.com/${{ github.repository }}/releases/download/' + tagVersion + '/MusicFree-v' + version + '-arm64-v8a-release.apk',
              'https://github.com/${{ github.repository }}/releases/download/' + tagVersion + '/MusicFree-v' + version + '-universal-release.apk'
            ];
            const versionInfo = {
              version: version,
              changeLog: existingChangeLog,
              download: downloadUrls
            };
            fs.writeFileSync('release/version.json', JSON.stringify(versionInfo, null, 2) + '\n');
            console.log('✅ Updated version.json:', JSON.stringify(versionInfo, null, 2));
          "

      - name: Generate build info
        id: build-info
        run: |
          echo "📝 Generating build info..."
          npm run generate-build-info
          BUILD_TIME=$(node -e "console.log(require('./src/constants/buildInfo.ts').buildInfo.buildTime)")
          echo "build-time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "✅ Build info generated"

      - name: Setup Gradle with permissions and cache warmup
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew --version
          echo "🚀 Pre-building React Native native modules..."
          cd android && ./gradlew :app:preBuild \
            --build-cache \
            --parallel \
            --daemon \
            --no-scan \
            --max-workers=2 \
            --quiet \
            || echo "⚠️  Pre-build completed with warnings"

      # ========= 安全注入密钥库 =========
      - name: Setup keystore from secrets (base64)
        run: |
          mkdir -p android/app
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > android/app/release.keystore

      - name: Create keystore.properties from secrets
        run: |
          cat <<EOF > android/keystore.properties
          storeFile=release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      # ========= 可选：尝试强制转换PKCS12为JKS，如果已是JKS忽略错误 =========
      - name: Ensure keystore is JKS format (optional)
        continue-on-error: true
        run: |
          keytool -importkeystore \
            -srckeystore android/app/release.keystore \
            -destkeystore android/app/release.keystore.jks \
            -srcstoretype PKCS12 \
            -deststoretype JKS \
            -srcstorepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -deststorepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -srckeypass "${{ secrets.KEY_PASSWORD }}" \
            -destkeypass "${{ secrets.KEY_PASSWORD }}" \
            -srcalias "${{ secrets.KEY_ALIAS }}" \
            -destalias "${{ secrets.KEY_ALIAS }}" \
            -noprompt 2>/dev/null || echo "Keystore already in JKS format or conversion skipped."
          if [ -f android/app/release.keystore.jks ]; then
            mv -f android/app/release.keystore.jks android/app/release.keystore
          fi

      # ========= 构建 =========
      - name: Build Android APK
        timeout-minutes: 45
        run: |
          cd android

          echo "📱 Starting Android APK build..."

          if [[ ! -f "keystore.properties" ]]; then
            echo "❌ ERROR: keystore.properties not found!"
            exit 1
          fi

          if [[ ! -f "app/release.keystore" ]]; then
            echo "❌ ERROR: release.keystore not found!"
            exit 1
          fi

          set +e
          ./gradlew assembleRelease \
            --build-cache \
            --parallel \
            --daemon \
            --no-scan \
            --stacktrace \
            --max-workers=3 \
            2>&1 | tee build.log
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "❌ Gradle build failed with exit code $BUILD_EXIT_CODE!"
            echo "=============== EXTRACTING ERROR DETAILS ==============="
            echo "--- Searching for Kotlin errors (e:) ---"
            grep -E "^e: " build.log || echo "No 'e:' errors found"
            echo ""
            echo "--- Searching for compilation failures ---"
            grep -B 5 -A 10 "compileReleaseKotlin" build.log | grep -E "e: |error:|FAILED" || echo "No compilation errors found"
            echo ""
            echo "--- Last 100 lines with 'error' keyword ---"
            tail -100 build.log | grep -i "error" || echo "No error keyword found"
            echo "========================================================="
            exit $BUILD_EXIT_CODE
          fi

          echo "✅ Android APK build completed successfully"

          APK_DIR="app/build/outputs/apk/release"
          echo "📦 Verifying build outputs in $APK_DIR..."

          if [[ ! -d "$APK_DIR" ]]; then
            echo "❌ ERROR: APK output directory not found!"
            exit 1
          fi

          APK_COUNT=$(find "$APK_DIR" -name "*.apk" | wc -l)
          echo "🎯 Found $APK_COUNT APK files"
          if [[ $APK_COUNT -eq 0 ]]; then
            echo "❌ ERROR: No APK files were generated!"
            exit 1
          fi

          echo "📋 Generated APK files:"
          find "$APK_DIR" -name "*.apk" -exec ls -lh {} \;
        env:
          GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8'
          ANDROID_COMPILE_SDK: '34'
          ANDROID_BUILD_TOOLS: '34.0.0'

      - name: Upload All APKs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: musicfree-${{ github.event.inputs.version || github.ref_name }}-all-apks
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          compression-level: 9

      - name: Verify APK files exist
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "🔍 Checking APK files..."
          APK_DIR="android/app/build/outputs/apk/release"
          ls -la $APK_DIR/

          TAG_VERSION="${{ github.ref_name }}"
          VERSION=${TAG_VERSION#v}
          MISSING_FILES=()
          EXPECTED_FILES=(
            "MusicFree-v${VERSION}-universal-release.apk"
            "MusicFree-v${VERSION}-arm64-v8a-release.apk"
            "MusicFree-v${VERSION}-armeabi-v7a-release.apk"
            "MusicFree-v${VERSION}-x86_64-release.apk"
            "MusicFree-v${VERSION}-x86-release.apk"
          )
          for file in "${EXPECTED_FILES[@]}"; do
            if [[ ! -f "$APK_DIR/$file" ]]; then
              MISSING_FILES+=("$file")
              echo "❌ Missing: $file"
            else
              echo "✅ Found: $file"
            fi
          done
          if [[ ${#MISSING_FILES[@]} -gt 0 ]]; then
            echo "🚨 ERROR: ${#MISSING_FILES[@]} APK files are missing!"
            exit 1
          else
            echo "🎉 All APK files are present!"
          fi

      - name: Generate Release Body
        if: startsWith(github.ref, 'refs/tags/')
        id: release-body
        run: |
          echo "📝 Generating release body from version.json..."

          TAG_VERSION="${{ github.ref_name }}"
          VERSION=${TAG_VERSION#v}

          CHANGELOG=$(node -e "
            const fs = require('fs');
            const versionData = JSON.parse(fs.readFileSync('release/version.json', 'utf8'));
            const changeLog = versionData.changeLog || [];
            const formattedLog = changeLog.map((item, index) => `${index + 1}. ${item}`).join('\n');
            console.log(formattedLog);
          ")

          cat > release_body.md << EOF
          ## 🎵 MusicFree ${{ github.ref_name }}

          ### 📱 下载选项

          **推荐下载 (适用于所有设备):**
          - **Universal APK**: [MusicFree-v${VERSION}-universal-release.apk](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/MusicFree-v${VERSION}-universal-release.apk)

          **按设备架构下载 (体积更小):**
          - **ARM64 (推荐)**: [MusicFree-v${VERSION}-arm64-v8a-release.apk](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/MusicFree-v${VERSION}-arm64-v8a-release.apk)
          - **ARM32**: [MusicFree-v${VERSION}-armeabi-v7a-release.apk](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/MusicFree-v${VERSION}-armeabi-v7a-release.apk)
          - **x86_64**: [MusicFree-v${VERSION}-x86_64-release.apk](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/MusicFree-v${VERSION}-x86_64-release.apk)
          - **x86**: [MusicFree-v${VERSION}-x86-release.apk](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/MusicFree-v${VERSION}-x86-release.apk)

          ### 🔄 更新内容

          $CHANGELOG

          ### 🔧 构建信息
          - 构建时间: ${{ steps.build-info.outputs.build-time }}
          - 提交SHA: ${{ github.sha }}
          EOF
          echo "✅ Release body generated"

      - name: Create Release and Upload APKs
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TZ: Asia/Shanghai
        with:
          tag_name: ${{ github.ref_name }}
          name: MusicFree ${{ github.ref_name }}
          body_path: release_body.md
          draft: false
          prerelease: false
          files: |
            android/app/build/outputs/apk/release/MusicFree-*.apk

      - name: Commit updated version files
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "📝 Committing updated version files..."
          git config --local user.email "3ssa@163.com"
          git config --local user.name "Toskysun"
          CHANGED_FILES=""
          if ! git diff --quiet package.json; then
            CHANGED_FILES="$CHANGED_FILES package.json"
          fi
          if ! git diff --quiet release/version.json; then
            CHANGED_FILES="$CHANGED_FILES release/version.json"
          fi
          if [ -z "$CHANGED_FILES" ]; then
            echo "ℹ️ No changes to version files, skipping commit"
          else
            echo "📝 Changes detected in: $CHANGED_FILES"
            git add package.json app.json release/version.json
            git commit -m "chore: update version to ${{ github.ref_name }} [skip ci]"
            echo "📤 Pushing version files to master..."
            git push origin HEAD:master
            echo "✅ Version files updated and pushed to master branch"
          fi

      - name: Security cleanup
        if: always()
        run: |
          echo "🧹 Performing security cleanup..."
          if [[ -f "android/app/release.keystore" ]]; then
            shred -vfz -n 3 android/app/release.keystore 2>/dev/null || rm -f android/app/release.keystore
            echo "✅ Keystore file cleaned"
          fi
          if [[ -f "android/keystore.properties" ]]; then
            shred -vfz -n 3 android/keystore.properties 2>/dev/null || rm -f android/keystore.properties
            echo "✅ Keystore properties cleaned"
          fi
          find . -name "*.keystore" -type f -delete 2>/dev/null || true
          find . -name "keystore.properties" -type f -delete 2>/dev/null || true
          echo "🔐 Security cleanup completed"